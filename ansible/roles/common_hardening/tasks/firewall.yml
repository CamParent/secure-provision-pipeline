---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set UFW default incoming policy
  community.general.ufw:
    direction: incoming
    policy: "{{ common_hardening_ufw_default_incoming }}"

- name: Set UFW default outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: "{{ common_hardening_ufw_default_outgoing }}"

- name: Allow required ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ common_hardening_ufw_allowed_ports }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
