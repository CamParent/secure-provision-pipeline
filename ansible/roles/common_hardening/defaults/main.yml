---
# Variables here are the "factory settings" for this role - every one can
# be overridden per-host or per-group in ansible/group_vars/ without
# touching this file.

common_hardening_ssh_permit_root_login: "no"
common_hardening_ssh_password_auth: "no"
common_hardening_ssh_port: 22

common_hardening_ufw_enabled: true
common_hardening_ufw_default_incoming: "deny"
common_hardening_ufw_default_outgoing: "allow"
common_hardening_ufw_allowed_ports:
  - "{{ common_hardening_ssh_port }}"

common_hardening_unattended_upgrades_enabled: true

common_hardening_fail2ban_enabled: true
common_hardening_fail2ban_bantime: 3600
common_hardening_fail2ban_maxretry: 5
